spring:
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update 
    properties:
      hibernate:
        #dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true